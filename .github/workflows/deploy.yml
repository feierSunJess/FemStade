name: Deploy zu All-Inkl

# Lädt bei jedem Push auf main alle Website-Dateien per FTP zu All-Inkl hoch.
# Einrichtung (einmalig, machen wir gemeinsam):
#   1. Repo auf GitHub anlegen, diesen FemStade-Ordner als Repo-Wurzel pushen.
#   2. In GitHub unter Settings -> Secrets and variables -> Actions diese Secrets setzen:
#        FTP_SERVER   = (FTP-Host von All-Inkl, z. B. wXXXXXXX.kasserver.com)
#        FTP_USERNAME = (FTP-Benutzer)
#        FTP_PASSWORD = (FTP-Passwort)
#   3. server-dir ggf. anpassen (Pfad zum Web-Verzeichnis bei All-Inkl, oft /).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          # Diese Dateien NICHT hochladen:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/BUILD-NOTES.md
